name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - name: Build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          cd sidecar
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          cd ..
          npm run tauri build

      - name: Generate manifest and upload
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="src-tauri/target/release/bundle"
          DMG_FILE=$(ls "$BUNDLE"/dmg/*.dmg 2>/dev/null | head -1)
          SIG_FILE=$(find "$BUNDLE" -name "*.sig" 2>/dev/null | head -1)
          echo "=== Build artifacts ==="
          ls -la "$BUNDLE"/dmg/ 2>/dev/null || true
          if [ -z "$DMG_FILE" ]; then echo "ERROR: no DMG"; exit 1; fi
          SIG=$(cat "$SIG_FILE" 2>/dev/null || echo "")
          echo "{\"version\":\"$VERSION\",\"notes\":\"Latiao v$VERSION\",\"pub_date\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"platforms\":{\"darwin-aarch64\":{\"url\":\"https://github.com/RenYiX0620/Latiao/releases/download/$GITHUB_REF_NAME/Latiao_${VERSION}_aarch64.dmg\",\"signature\":\"$SIG\"}}}" > "$BUNDLE/dmg/latest.json"
          echo "Manifest: $(cat "$BUNDLE/dmg/latest.json")"

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/dmg/*.sig
            src-tauri/target/release/bundle/dmg/latest.json
          draft: false
          generate_release_notes: true
